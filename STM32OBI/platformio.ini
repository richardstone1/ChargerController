; STM32 Blue Pill (STM32F103C8) port of Open Battery Information (OBI)
; Same host serial protocol as ArduinoOBI @ 9600 baud.

[platformio]
default_envs = bluepill

; Micro USB: USB CDC virtual COM (Uno-like single cable for host tools)
[env:bluepill]
platform = ststm32
board = bluepill_f103c8
framework = arduino
board_build.f_cpu = 72000000L
monitor_speed = 9600
build_flags =
    -DUSBCON
    -DUSBD_USE_CDC
    -DHAL_PCD_MODULE_ENABLED
    -DUSBD_VID=0x0483
    -DUSBD_PID=0x5740
; ST-Link (default). For ROM UART bootloader: env bluepill_serial

; Optional: USART1 on A9/A10 + USB-TTL dongle (no micro-USB serial)
[env:bluepill_usart]
platform = ststm32
board = bluepill_f103c8
framework = arduino
board_build.f_cpu = 72000000L
monitor_speed = 9600

[env:bluepill_serial]
extends = env:bluepill
upload_protocol = serial

[env:bluepill_usart_serial]
extends = env:bluepill_usart
upload_protocol = serial
