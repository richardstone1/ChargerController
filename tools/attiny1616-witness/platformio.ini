; ATtiny1616 witness MCU — Makita OBI + analog sense
; Program via jtag2updi (see ../jtag2updi/SETUP-ARDUINO-MEGA.md)

[env:attiny1616]
platform = atmelmegaavr
board = ATtiny1616
framework = arduino
board_build.f_cpu = 20000000L
monitor_speed = 115200
upload_protocol = custom
upload_speed = 115200
upload_flags =
    -c
    jtag2updi
    -P
    $UPLOAD_PORT
    -p
    t1616
upload_command = avrdude $UPLOAD_FLAGS -U flash:w:$SOURCE:i

; Optional: UART debug on Mega UPDI programmer port — use separate USB-serial on PA1/PA2 if wired
lib_deps =
